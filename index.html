<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>dogum gunun kutlu olsun?</title>
    <style>
        body {
            font-family: 'Clarendon', 'Georgia', serif;
            background-color: #ffffff;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
            text-align: center;
            position: relative;
        }

        .container {
            background-color: #ffffff;
            padding: 40px;
            max-width: 500px;
            width: 90%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 10;
        }

        h1 {
            color: #ffffff;
            font-size: 2.2rem;
            margin-bottom: 30px;
        }

        .buttons {
            display: flex;
            justify-content: center;
            gap: 20px;
            align-items: center;
            position: relative;
            height: 80px;
            width: 100%;
        }

        button {
            padding: 15px 35px;
            font-size: 1.3rem;
            font-weight: bold;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            transition: transform 0.2s ease;
        }

        #yesBtn {
            background-color: #ff0000;
            color: white;
        }

        #yesBtn:hover {
            transform: scale(1.1);
        }

        #noBtn {
            background-color: #800080;
            color: white;
        }

        .success-message {
            display: none;
            text-align: center;
        }

        .success-message h2 {
            color: #ffffff;
            font-size: 2.5rem;
            margin: 0;
        }

        /* Havai fişek gibi patlayıp 1 saniyede yok olan konfetiler */
        .confetti {
            position: absolute;
            width: 10px;
            height: 14px;
            z-index: 5;
            opacity: 1;
            pointer-events: none;
            animation: explode 1s cubic-bezier(0.1, 0.8, 0.3, 1) forwards;
        }

        @keyframes explode {
            0% {
                transform: translate(0, 0) scale(1.2) rotate(0deg);
                opacity: 1;
            }
            100% {
                transform: translate(var(--x), var(--y)) scale(0.3) rotate(var(--r));
                opacity: 0;
            }
        }
    </style>
</head>
<body>

    <div class="container">
        <div id="quiz">
            <h1>dogum gunun kutlu olsun?</h1>
            <div class="buttons">
                <button id="yesBtn" onclick="accepted()">olsun.</button>
                <button id="noBtn" onclick="rejected()">olmasın.</button>
            </div>
        </div>

       <div id="success" class="success-message">
    <img src="when school is over and you have no homework.jpg"
         alt="YIPPEEE"
         style="max-width:350px; width:100%; margin-bottom:20px;">

    <h2>dogum gunun kutlu olsun</h2>
</div>
        
    </div>

    <script>
        const messages = [
            "ananiskm oc",
            "yapma ya pic",
            "olucak",
            "ez",
            "kolaydı"
        ];
        
        let messageIndex = 0;
        let yesButtonSize = 1;

        function rejected() {
            const noBtn = document.getElementById('noBtn');
            const yesBtn = document.getElementById('yesBtn');
            const question = document.querySelector('#quiz h1');

            if (messageIndex < messages.length) {
                question.innerText = messages[messageIndex];
                messageIndex++;

                yesButtonSize += 0.4;
                yesBtn.style.transform = `scale(${yesButtonSize})`;
            } else {
                noBtn.style.display = 'none';
                question.innerText = "olucak";
            }
        }

        function accepted() {
            // Yapısal çökme olmaması için net geçiş
            document.getElementById('quiz').style.display = 'none';
            document.getElementById('success').style.display = 'block';

            const colors = ['#ff0000', '#800080', '#ffffff', '#ffeb3b', '#4caf50', '#00bcd4'];
            for (let i = 0; i < 150; i++) {
                const confetti = document.createElement('div');
                confetti.classList.add('confetti');
                
                // Tam merkezden patlama çıkışı
                confetti.style.left = '50vw';
                confetti.style.top = '50vh';
                
                const randomX = (Math.random() * 700 - 350) + 'px';
                const randomY = (Math.random() * 700 - 350) + 'px';
                const randomRotate = (Math.random() * 720 - 360) + 'deg';
                
                confetti.style.setProperty('--x', randomX);
                confetti.style.setProperty('--y', randomY);
                confetti.style.setProperty('--r', randomRotate);
                
                const randomColorIndex = Math.floor(Math.random() * colors.length);
                confetti.style.backgroundColor = colors[randomColorIndex];
                
                confetti.style.width = (Math.random() * 8 + 6) + 'px';
                confetti.style.height = (Math.random() * 14 + 6) + 'px';
                
                document.body.appendChild(confetti);
                
                // 1 saniye sonra dom temizliği
                setTimeout(() => { confetti.remove(); }, 1000);
            }
        }
    </script>

</body>
</html>
